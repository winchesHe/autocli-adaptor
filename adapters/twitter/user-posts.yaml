site: twitter
name: user-posts
description: Fetch Twitter/X posts via GQL (UserByScreenName + UserTweets). Single-user with --username, or batch with --usernames "h1,h2,..." (one navigate, N GQL).
domain: x.com
tags: [twitter, x, posts, user, media, gql]
strategy: cookie
browser: true

args:
  username:
    type: str
    required: false
    description: Twitter/X username without @ (single-user mode)
  usernames:
    type: str
    default: ""
    description: 批量模式：comma-separated handles (e.g. "alice,bob,carol")。提供时优先于 username，整批共享一次 navigate
  limit:
    type: int
    default: 20
    description: Maximum number of posts to return
  since:
    type: str
    default: ""
    description: Keep posts at or after this date/time, e.g. 2026-05-01
  until:
    type: str
    default: ""
    description: Keep posts at or before this date/time, e.g. 2026-05-03
  include-detail:
    type: str
    default: "false"
    description: true/false; open each post detail page to refresh full visible text and media
  download-media:
    type: str
    default: "false"
    description: true/false; fetch image bytes as data URLs in the JSON output
  rate-limit-ms:
    type: int
    default: 1200
    description: 翻页之间最小间隔毫秒，避免触发 X 429 限流；设为 0 关闭
  inter-user-ms:
    type: int
    default: 1500
    description: 批量模式（--usernames）下用户之间间隔毫秒，节流防 429；设为 0 关闭

columns: [rank, id, created_at, author, content, media_count, url]

pipeline:
  # 一次 navigate：让 Chrome tab 落在 x.com，刷新 ct0 + 建立 same-origin。
  # evaluate 内部用 --usernames 批量循环时，所有 handle 共享这次 navigate（cookies 只刷一次）。
  - navigate:
      url: https://x.com/home
      settleMs: 3000

  - evaluate: |
      (async () => {
        const username = String(args.username || '').replace(/^@/, '').trim();
        const usernamesRaw = String(args.usernames || '').trim();
        const handles = usernamesRaw
          ? usernamesRaw.split(',').map(s => s.replace(/^@/, '').trim()).filter(Boolean)
          : (username ? [username] : []);
        if (!handles.length) throw new Error('Missing --username or --usernames');
        const limit = Math.max(1, Number(args.limit || 20));
        const includeDetail = String(args['include-detail'] || 'false').toLowerCase() === 'true';
        const downloadMedia = String(args['download-media'] || 'false').toLowerCase() === 'true';
        const interUserMs = Math.max(0, Number(args['inter-user-ms'] || 1500));
        const warnings = [];

        const sleep = (ms) => new Promise((resolve) => setTimeout(resolve, ms));

        const parseBoundary = (raw, isUntil) => {
          const value = String(raw || '').trim();
          if (!value) return null;
          const normalized = /^\d{4}-\d{2}-\d{2}$/.test(value)
            ? `${value}T${isUntil ? '23:59:59.999' : '00:00:00.000'}Z`
            : value;
          const date = new Date(normalized);
          if (Number.isNaN(date.getTime())) {
            warnings.push(`Ignored invalid ${isUntil ? 'until' : 'since'} value: ${value}`);
            return null;
          }
          return date;
        };

        const since = parseBoundary(args.since, false);
        const until = parseBoundary(args.until, true);

        const absolutize = (href) => {
          if (!href) return '';
          if (href.startsWith('http')) return href;
          return `https://x.com${href}`;
        };

        const normalizeImageUrl = (src) => {
          if (!src || !src.includes('pbs.twimg.com/media')) return '';
          let next = src.replace(/[?&]name=\w+/, (match) => `${match[0]}name=large`);
          if (!/[?&]name=/.test(next)) {
            next += next.includes('?') ? '&name=large' : '?format=jpg&name=large';
          }
          return next;
        };

        const metricValue = (text) => {
          const raw = String(text || '').replace(/,/g, '').trim();
          if (!raw) return 0;
          const match = raw.match(/([\d.]+)\s*([KMB万億亿]?)/i);
          if (!match) return 0;
          const n = Number(match[1]);
          if (!Number.isFinite(n)) return 0;
          const suffix = match[2].toUpperCase();
          if (suffix === 'K') return Math.round(n * 1_000);
          if (suffix === 'M') return Math.round(n * 1_000_000);
          if (suffix === 'B') return Math.round(n * 1_000_000_000);
          if (suffix === '万') return Math.round(n * 10_000);
          if (suffix === '億' || suffix === '亿') return Math.round(n * 100_000_000);
          return Math.round(n);
        };

        // ─── GQL 路径：UserByScreenName → UserTweets，严格模式（DOM 滚动兜底已移除） ───
        const bearer = 'AAAAAAAAAAAAAAAAAAAAANRILgAAAAAAnNwIzUejRCOuH5E6I8xnZz4puTs%3D1Zv7ttfk8LF81IUq16cHjhLTvJu4FA33AGWWjCpTnA';
        const ct0 = document.cookie.split(';').map((c) => c.trim()).find((c) => c.startsWith('ct0='))?.split('=')[1];

        const resolveQueryId = async (operationName, fallbackId) => {
          try {
            const ghResp = await fetch('https://raw.githubusercontent.com/fa0311/twitter-openapi/refs/heads/main/src/config/placeholder.json');
            if (ghResp.ok) {
              const placeholder = await ghResp.json();
              const entry = placeholder[operationName];
              if (entry && entry.queryId) return entry.queryId;
            }
          } catch {}
          try {
            const scripts = performance.getEntriesByType('resource')
              .filter((r) => r.name.includes('client-web') && r.name.endsWith('.js'))
              .map((r) => r.name);
            for (const scriptUrl of scripts.slice(0, 15)) {
              try {
                const text = await (await fetch(scriptUrl)).text();
                const re = new RegExp(`queryId:"([A-Za-z0-9_-]+)"[^}]{0,200}operationName:"${operationName}"`);
                const match = text.match(re);
                if (match) return match[1];
              } catch {}
            }
          } catch {}
          return fallbackId;
        };

        const gqlGet = async (operationName, queryId, variables, features, fieldToggles) => {
          if (!ct0) throw new Error('No ct0 cookie - not logged into x.com');
          const url = `/i/api/graphql/${queryId}/${operationName}`
            + `?variables=${encodeURIComponent(JSON.stringify(variables))}`
            + `&features=${encodeURIComponent(JSON.stringify(features))}`
            + (fieldToggles ? `&fieldToggles=${encodeURIComponent(JSON.stringify(fieldToggles))}` : '');
          const resp = await fetch(url, {
            credentials: 'include',
            headers: {
              Authorization: `Bearer ${decodeURIComponent(bearer)}`,
              'X-Csrf-Token': ct0,
              'X-Twitter-Active-User': 'yes',
              'X-Twitter-Auth-Type': 'OAuth2Session',
            },
          });
          if (!resp.ok) throw new Error(`${operationName} HTTP ${resp.status}`);
          return resp.json();
        };

        const parseTwitterDate = (s) => {
          if (!s) return '';
          // legacy.created_at: "Sun May 04 13:39:49 +0000 2026"
          const d = new Date(s);
          if (Number.isNaN(d.getTime())) return '';
          return d.toISOString();
        };

        const tweetToPost = (result, rankHint, ownerHandle) => {
          const tweet = result?.tweet || result;
          if (!tweet) return null;
          const legacy = tweet.legacy || {};
          const id = tweet.rest_id || legacy.id_str || '';
          if (!id) return null;
          const user = tweet.core?.user_results?.result;
          const screenName = user?.legacy?.screen_name || user?.core?.screen_name || ownerHandle;
          const noteText = tweet.note_tweet?.note_tweet_results?.result?.text;
          const createdAtIso = parseTwitterDate(legacy.created_at);
          const mediaEntities = [
            ...(legacy.extended_entities?.media || []),
            ...(legacy.entities?.media || []),
          ];
          const mediaUrls = Array.from(new Set(mediaEntities
            .map((m) => m.media_url_https || m.media_url || '')
            .map(normalizeImageUrl)
            .filter(Boolean)));
          return {
            rank: rankHint,
            id,
            author: screenName,
            created_at: createdAtIso,
            time_parse_status: createdAtIso ? 'ok' : 'missing_or_unparseable',
            text: noteText || legacy.full_text || '',
            detail_text: '',
            url: `https://x.com/${screenName}/status/${id}`,
            media_urls: mediaUrls,
            media_count: mediaUrls.length,
            local_media_paths: [],
            media_data_urls: [],
            metrics: {
              replies: legacy.reply_count || 0,
              reposts: legacy.retweet_count || 0,
              likes: legacy.favorite_count || 0,
              views: tweet.views?.count ? Number(tweet.views.count) || 0 : 0,
            },
          };
        };

        const fetchUserTimelineGql = async (handle, want) => {
          // 1. 解析 rest_id
          const userVars = { screen_name: handle, withSafetyModeUserFields: true };
          const userFeatures = {
            hidden_profile_likes_enabled: true,
            hidden_profile_subscriptions_enabled: true,
            responsive_web_graphql_exclude_directive_enabled: true,
            verified_phone_label_enabled: false,
            subscriptions_verification_info_is_identity_verified_enabled: true,
            subscriptions_verification_info_verified_since_enabled: true,
            highlights_tweets_tab_ui_enabled: true,
            creator_subscriptions_tweet_preview_api_enabled: true,
            responsive_web_graphql_skip_user_profile_image_extensions_enabled: false,
            responsive_web_graphql_timeline_navigation_enabled: true,
          };
          const userQueryId = await resolveQueryId('UserByScreenName', 'G3KGOASz96M-Qu0nwmGXNg');
          const userJson = await gqlGet('UserByScreenName', userQueryId, userVars, userFeatures, { withAuxiliaryUserLabels: false });
          const restId = userJson?.data?.user?.result?.rest_id;
          if (!restId) throw new Error(`UserByScreenName returned no rest_id for ${handle}`);

          // 2. 分页拉 UserTweets
          const tweetsQueryId = await resolveQueryId('UserTweets', 'V7H0Ap3_Hh2FyS75OCDO3Q');
          const tweetsFeatures = {
            rweb_tipjar_consumption_enabled: true,
            responsive_web_graphql_exclude_directive_enabled: true,
            verified_phone_label_enabled: false,
            creator_subscriptions_tweet_preview_api_enabled: true,
            responsive_web_graphql_timeline_navigation_enabled: true,
            responsive_web_graphql_skip_user_profile_image_extensions_enabled: false,
            communities_web_enable_tweet_community_results_fetch: true,
            c9s_tweet_anatomy_moderator_badge_enabled: true,
            articles_preview_enabled: true,
            responsive_web_edit_tweet_api_enabled: true,
            graphql_is_translatable_rweb_tweet_is_translatable_enabled: true,
            view_counts_everywhere_api_enabled: true,
            longform_notetweets_consumption_enabled: true,
            responsive_web_twitter_article_tweet_consumption_enabled: true,
            tweet_awards_web_tipping_enabled: false,
            creator_subscriptions_quote_tweet_preview_enabled: false,
            freedom_of_speech_not_reach_fetch_enabled: true,
            standardized_nudges_misinfo: true,
            tweet_with_visibility_results_prefer_gql_limited_actions_policy_enabled: true,
            rweb_video_timestamps_enabled: true,
            longform_notetweets_rich_text_read_enabled: true,
            longform_notetweets_inline_media_enabled: true,
            responsive_web_enhance_cards_enabled: false,
          };

          // GQL 节流：UserTweets 翻页之间至少间隔 RATE_LIMIT_MS，
          // 避免短时高频请求触发 X 的 429（X web GQL 大致 ~150 req / 15min，
          // 但短时窗口阈值更严，1.2s 间隔可以稳住分页场景）
          const rateLimitMs = Math.max(0, Number(args['rate-limit-ms'] || 1200));

          const collected = [];
          let cursor = '';
          for (let page = 0; page < 8 && collected.length < want; page++) {
            if (page > 0 && rateLimitMs > 0) await sleep(rateLimitMs);
            const variables = {
              userId: restId,
              count: Math.min(40, Math.max(20, want - collected.length + 5)),
              includePromotedContent: false,
              withQuickPromoteEligibilityTweetFields: true,
              withVoice: true,
              withV2Timeline: true,
            };
            if (cursor) variables.cursor = cursor;
            const resp = await gqlGet('UserTweets', tweetsQueryId, variables, tweetsFeatures, { withArticlePlainText: false });
            const instructions = resp?.data?.user?.result?.timeline_v2?.timeline?.instructions
              || resp?.data?.user?.result?.timeline?.timeline?.instructions
              || [];
            let nextCursor = '';
            let pageHadTweet = false;
            for (const inst of instructions) {
              if (inst.type === 'TimelinePinEntry' && inst.entry) {
                // 跳过置顶（保留行为：DOM 路径会包含置顶但乱序，这里直接忽略，更干净）
                continue;
              }
              if (inst.type !== 'TimelineAddEntries') continue;
              for (const entry of inst.entries || []) {
                const eid = entry.entryId || '';
                if (eid.startsWith('tweet-')) {
                  const result = entry.content?.itemContent?.tweet_results?.result;
                  if (result) {
                    const post = tweetToPost(result, collected.length + 1, handle);
                    if (post && post.created_at) {
                      const d = new Date(post.created_at);
                      if (since && d < since) { /* 旧帖：仍收集到 collected，是否过滤交给后面 */ }
                      if (until && d > until) continue;
                    }
                    if (post) {
                      collected.push(post);
                      pageHadTweet = true;
                    }
                  }
                } else if (eid.startsWith('profile-conversation-')) {
                  // 用户自己的 thread：itemContent 在 items 数组里
                  const items = entry.content?.items || [];
                  for (const item of items) {
                    const result = item.item?.itemContent?.tweet_results?.result;
                    if (!result) continue;
                    const post = tweetToPost(result, collected.length + 1, handle);
                    if (post) {
                      collected.push(post);
                      pageHadTweet = true;
                    }
                  }
                } else if (eid.startsWith('cursor-bottom-')) {
                  nextCursor = entry.content?.value || '';
                }
              }
            }
            // 提前终止：本页最早的 tweet 已早于 since
            if (since && collected.length) {
              const earliest = collected[collected.length - 1];
              if (earliest?.created_at && new Date(earliest.created_at) < since) break;
            }
            if (!nextCursor || nextCursor === cursor || !pageHadTweet) break;
            cursor = nextCursor;
          }

          // 应用 since 过滤、limit 截断、按 created_at 倒序
          const filtered = collected
            .filter((p) => {
              if (!p.created_at) return true;
              const d = new Date(p.created_at);
              if (since && d < since) return false;
              if (until && d > until) return false;
              return true;
            })
            .sort((a, b) => (b.created_at || '').localeCompare(a.created_at || ''))
            .slice(0, want);
          // 重新编号 rank
          filtered.forEach((p, i) => { p.rank = i + 1; });
          return filtered;
        };

        // GQL 严格路径：批量遍历 handles，每用户一次 fetchUserTimelineGql；
        // 单个用户失败不影响批次，记入 warnings；全部 0 条才抛错。
        const posts = [];
        let firstErr = null;
        for (let i = 0; i < handles.length; i++) {
          if (i > 0 && interUserMs > 0) await sleep(interUserMs);
          const handle = handles[i];
          try {
            const userPosts = await fetchUserTimelineGql(handle, limit);
            userPosts.forEach((p) => { p.requested_username = handle; });
            posts.push(...userPosts);
          } catch (e) {
            const msg = `fetch failed for ${handle}: ${e?.message || e}`;
            warnings.push(msg);
            if (!firstErr) firstErr = e;
            // 命中 429 → 直接抛，避免持续打 X
            if (String(e?.message || '').includes('HTTP 429')) {
              throw new Error(`Hit 429 on ${handle}; aborting batch. ${msg}`);
            }
          }
        }
        if (!posts.length) {
          throw firstErr || new Error(`UserTweets returned 0 posts for handles=${handles.join(',')}`);
        }

        const fetchImageDataUrl = async (url) => {
          try {
            const resp = await fetch(url, { credentials: 'include' });
            if (!resp.ok) return { url, status: `failed:${resp.status}`, data_url: '' };
            const blob = await resp.blob();
            const dataUrl = await new Promise((resolve, reject) => {
              const reader = new FileReader();
              reader.onload = () => resolve(String(reader.result || ''));
              reader.onerror = reject;
              reader.readAsDataURL(blob);
            });
            return { url, status: 'ok', content_type: blob.type || '', size: blob.size || 0, data_url: dataUrl };
          } catch (error) {
            return { url, status: `failed:${error?.message || 'unknown'}`, data_url: '' };
          }
        };

        const fetchTweetDetail = async (tweetId) => {
          const bearer = 'AAAAAAAAAAAAAAAAAAAAANRILgAAAAAAnNwIzUejRCOuH5E6I8xnZz4puTs%3D1Zv7ttfk8LF81IUq16cHjhLTvJu4FA33AGWWjCpTnA';
          const ct0 = document.cookie.split(';').map((c) => c.trim()).find((c) => c.startsWith('ct0='))?.split('=')[1];
          if (!ct0) throw new Error('No ct0 cookie - not logged into x.com');

          const resolveQueryId = async (operationName, fallbackId) => {
            try {
              const ghResp = await fetch('https://raw.githubusercontent.com/fa0311/twitter-openapi/refs/heads/main/src/config/placeholder.json');
              if (ghResp.ok) {
                const placeholder = await ghResp.json();
                const entry = placeholder[operationName];
                if (entry && entry.queryId) return entry.queryId;
              }
            } catch {}
            try {
              const scripts = performance.getEntriesByType('resource')
                .filter((r) => r.name.includes('client-web') && r.name.endsWith('.js'))
                .map((r) => r.name);
              for (const scriptUrl of scripts.slice(0, 15)) {
                try {
                  const text = await (await fetch(scriptUrl)).text();
                  const re = new RegExp(`queryId:"([A-Za-z0-9_-]+)"[^}]{0,200}operationName:"${operationName}"`);
                  const match = text.match(re);
                  if (match) return match[1];
                } catch {}
              }
            } catch {}
            return fallbackId;
          };

          const variables = {
            tweetId,
            withCommunity: true,
            includePromotedContent: false,
            withVoice: true,
          };
          const features = {
            creator_subscriptions_tweet_preview_api_enabled: true,
            freedom_of_speech_not_reach_fetch_enabled: true,
            longform_notetweets_consumption_enabled: true,
            longform_notetweets_inline_media_enabled: true,
            longform_notetweets_rich_text_read_enabled: true,
            responsive_web_edit_tweet_api_enabled: true,
            responsive_web_enhance_cards_enabled: false,
            responsive_web_graphql_exclude_directive_enabled: true,
            responsive_web_graphql_skip_user_profile_image_extensions_enabled: false,
            responsive_web_graphql_timeline_navigation_enabled: true,
            responsive_web_twitter_article_tweet_consumption_enabled: true,
            standardized_nudges_misinfo: true,
            tweet_with_visibility_results_prefer_gql_limited_actions_policy_enabled: true,
            verified_phone_label_enabled: false,
            view_counts_everywhere_api_enabled: true,
          };
          const fieldToggles = {
            withArticlePlainText: true,
            withArticleRichContentState: true,
          };

          const queryId = await resolveQueryId('TweetResultByRestId', '7xflPyRiUxGVbJd4uWmbfg');
          const apiUrl = `/i/api/graphql/${queryId}/TweetResultByRestId`
            + `?variables=${encodeURIComponent(JSON.stringify(variables))}`
            + `&features=${encodeURIComponent(JSON.stringify(features))}`
            + `&fieldToggles=${encodeURIComponent(JSON.stringify(fieldToggles))}`;
          const resp = await fetch(apiUrl, {
            credentials: 'include',
            headers: {
              Authorization: `Bearer ${decodeURIComponent(bearer)}`,
              'X-Csrf-Token': ct0,
              'X-Twitter-Active-User': 'yes',
              'X-Twitter-Auth-Type': 'OAuth2Session',
            },
          });
          if (!resp.ok) throw new Error(`TweetResultByRestId HTTP ${resp.status}`);

          const payload = await resp.json();
          const result = payload.data?.tweetResult?.result;
          const tweet = result?.tweet || result;
          if (!tweet) throw new Error('Tweet detail payload missing tweet result');

          const legacy = tweet.legacy || {};
          const user = tweet.core?.user_results?.result;
          const screenName = user?.legacy?.screen_name || user?.core?.screen_name || handles[0] || '';
          const noteText = tweet.note_tweet?.note_tweet_results?.result?.text;
          const articleResults = tweet.article?.article_results?.result;

          const extractArticleContent = (article) => {
            if (!article) return null;
            const contentState = article.content_state || {};
            const blocks = contentState.blocks || [];
            const parts = [];
            let orderedCounter = 0;

            for (const block of blocks) {
              const blockType = block.type || 'unstyled';
              if (blockType === 'atomic') continue;
              const text = block.text || '';
              if (!text) continue;
              if (blockType !== 'ordered-list-item') orderedCounter = 0;

              if (blockType === 'header-one') parts.push(`# ${text}`);
              else if (blockType === 'header-two') parts.push(`## ${text}`);
              else if (blockType === 'header-three') parts.push(`### ${text}`);
              else if (blockType === 'blockquote') parts.push(`> ${text}`);
              else if (blockType === 'unordered-list-item') parts.push(`- ${text}`);
              else if (blockType === 'ordered-list-item') {
                orderedCounter += 1;
                parts.push(`${orderedCounter}. ${text}`);
              } else if (blockType === 'code-block') {
                parts.push(`\`\`\`\n${text}\n\`\`\``);
              } else {
                parts.push(text);
              }
            }

            const content = parts.join('\n\n').trim();
            if (!content) return null;
            return {
              title: article.title || '',
              content,
            };
          };

          const article = extractArticleContent(articleResults);
          const mediaEntities = [
            ...(legacy.extended_entities?.media || []),
            ...(legacy.entities?.media || []),
          ];
          const mediaUrls = mediaEntities
            .map((media) => media.media_url_https || media.media_url || '')
            .map(normalizeImageUrl)
            .filter(Boolean);

          return {
            author: screenName,
            created_at: legacy.created_at || '',
            text: noteText || legacy.full_text || '',
            article_title: article?.title || '',
            detail_text: article?.content || noteText || legacy.full_text || '',
            has_article: Boolean(article?.content),
            media_urls: Array.from(new Set(mediaUrls)),
            metrics: {
              replies: legacy.reply_count || 0,
              reposts: legacy.retweet_count || 0,
              likes: legacy.favorite_count || 0,
              views: tweet.views?.count ? Number(tweet.views.count) || 0 : 0,
            },
          };
        };

        if (includeDetail || downloadMedia) {
          for (const post of posts) {
            if (!post.id) continue;
            try {
              const detail = await fetchTweetDetail(post.id);
              post.detail_text = detail.detail_text || detail.text || post.text;
              post.article_title = detail.article_title || '';
              post.has_article = detail.has_article || false;
              post.detail_source = detail.has_article ? 'article' : 'tweet';
              post.author = detail.author || post.author;
              post.media_urls = Array.from(new Set([...(post.media_urls || []), ...(detail.media_urls || [])]));
              post.media_count = post.media_urls.length;
              post.metrics = detail.metrics || post.metrics;
              post.created_at_detail = detail.created_at || '';

              if (downloadMedia && post.media_urls.length) {
                const mediaData = [];
                for (const mediaUrl of post.media_urls) {
                  mediaData.push(await fetchImageDataUrl(mediaUrl));
                }
                post.media_data_urls = mediaData;
              }
            } catch (error) {
              warnings.push(`Detail/media step failed for ${post.url}: ${error?.message || error}`);
            }
          }
        }

        if (downloadMedia) {
          warnings.push('download-media=true returns image bytes as media_data_urls when browser fetch allows it. For guaranteed local files, pipe JSON to ~/.autocli/adapters/twitter/download-media.py.');
        }

        return posts.map((post) => {
          // requested_username 已在批量循环里写入，单用户 fallback 用 handles[0]
          const result = {
            ...post,
            requested_username: post.requested_username || handles[0],
            warnings,
          };

          if (includeDetail || downloadMedia) {
            result.content = result.detail_text || result.text || '';
            delete result.text;
            delete result.detail_text;
          } else {
            result.content = result.text || '';
            delete result.text;
            delete result.detail_text;
            delete result.article_title;
            delete result.has_article;
            delete result.detail_source;
            delete result.created_at_detail;
          }

          return result;
        });
      })()
